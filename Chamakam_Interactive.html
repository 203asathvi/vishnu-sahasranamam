<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sri Rudram — Chamakam</title>
<style>
:root {
  --saffron:#e87c1e; --deep:#8B1A1A; --red:#C0392B;
  --gold:#c8931a;    --gold-lt:#f0c060; --gold-pale:#fdf3dc;
  --dark:#2b0a00;    --mid:#5a2200;     --card:#fffdf8;
  --bg:#fff8f0;      --border:#e8d5a0;
  --park:#1a7a3a;    --park-lt:#e8f7ee; --park-bd:#2ecc71;
  --blue:#2e6da4;    --blue-lt:#eaf3ff;
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Georgia',serif; background:var(--bg); color:var(--dark); min-height:100vh; padding-bottom:60px; }

/* ── Header ─────────────────────────────────────────────── */
.header { position:relative;
  background:linear-gradient(135deg,var(--deep) 0%,var(--red) 55%,var(--gold) 100%);
  color:#fff; text-align:center; padding:22px 16px 16px;
  position:sticky; top:0; z-index:100;
  box-shadow:0 3px 14px rgba(0,0,0,.35);
}
.header-om  { font-size:2rem; display:block; margin-bottom:2px; }
.header h1  { font-size:clamp(1.3rem,4vw,2rem); font-weight:700; letter-spacing:1px; text-shadow:0 2px 4px rgba(0,0,0,.4); }
.header h2  { font-size:clamp(.8rem,2.2vw,1.05rem); opacity:.88; margin-top:3px; font-weight:400; }

/* ── Anuvaka (group) nav ─────────────────────────────────── */
.gnav-section { background:#fff; border-bottom:2px solid var(--border); padding:10px 12px;
  position:sticky; top:82px; z-index:99; box-shadow:0 2px 6px rgba(0,0,0,.07); }
.gnav-label { font-size:11px; text-transform:uppercase; letter-spacing:2px; color:var(--gold); font-weight:700; margin-bottom:7px; text-align:center; }
.gnav { display:flex; justify-content:center; gap:6px; flex-wrap:wrap; }
.gb {
  padding:6px 13px; border-radius:20px; border:2px solid var(--gold);
  background:var(--card); color:var(--gold); font-size:.8rem; font-weight:700;
  cursor:pointer; transition:all .2s; white-space:nowrap;
}
.gb:hover   { border-color:var(--saffron); color:var(--saffron); }
.gb.active  { background:linear-gradient(135deg,var(--deep),var(--red)); color:#fff; border-color:var(--red); box-shadow:0 3px 10px rgba(192,57,43,.4); }

/* ── Verse bubble nav ────────────────────────────────────── */
.snav-wrap  { background:rgba(200,147,26,.07); border:1px solid #e8d090; border-radius:12px;
  padding:11px 14px; margin:12px 16px 0; display:none; max-width:820px; margin-left:auto; margin-right:auto; }
.snav-wrap.show { display:block; }
.snav-label { font-size:11px; text-transform:uppercase; letter-spacing:1.5px; color:var(--gold); font-weight:700; margin-bottom:8px; }
.snav       { display:flex; justify-content:center; gap:8px; flex-wrap:wrap; }
.sbb {
  width:38px; height:38px; border-radius:50%; border:2px solid var(--gold);
  background:var(--card); color:var(--gold); font-size:.82rem; font-weight:700;
  cursor:pointer; transition:all .18s; display:flex; align-items:center; justify-content:center;
  position:relative;
}
.sbb:hover  { border-color:var(--saffron); color:var(--saffron); transform:translateY(-2px); }
.sbb.active { background:linear-gradient(135deg,var(--deep),var(--red)); color:#fff; border-color:var(--red);
  box-shadow:0 4px 12px rgba(192,57,43,.45); transform:scale(1.12); }
.sbb.parked { border-color:var(--park) !important; box-shadow:0 0 0 3px rgba(26,122,58,.28) !important; }
.sbb.parked::after { content:"🔖"; font-size:9px; position:absolute; top:-5px; right:-5px;
  background:var(--park); border-radius:50%; width:16px; height:16px; display:flex; align-items:center; justify-content:center; }

/* ── Main area ───────────────────────────────────────────── */
#mc { max-width:820px; margin:18px auto 0; padding:0 16px; }

/* ── Verse Card ──────────────────────────────────────────── */
.card { background:var(--card); border:1.5px solid var(--border); border-radius:16px;
  margin-bottom:22px; box-shadow:0 4px 20px rgba(0,0,0,.08); display:none; overflow:hidden; }
.card.vis { display:block; }
.card.parked-card { border-color:var(--park-bd); box-shadow:0 4px 20px rgba(26,122,58,.18); }

/* Card header */
.card-head {
  background:linear-gradient(90deg,rgba(192,57,43,.9),rgba(200,147,26,.85));
  padding:11px 16px; display:flex; align-items:center; gap:10px;
}
.card-num  { background:rgba(255,255,255,.25); color:#fff; font-size:.75rem; font-weight:800;
  padding:3px 9px; border-radius:10px; letter-spacing:.5px; }
.card-title { color:#fff; font-size:.92rem; font-weight:700; flex:1; }
.park-btn  { margin-left:auto; display:flex; align-items:center; gap:5px;
  background:rgba(255,255,255,.18); border:1.5px solid rgba(255,255,255,.5);
  border-radius:14px; padding:4px 11px; color:#fff; font-size:.75rem; font-weight:700;
  cursor:pointer; transition:all .2s; }
.park-btn:hover  { background:rgba(255,255,255,.32); }
.park-btn.parked { background:var(--park); border-color:var(--park-bd); }

/* Card body */
.card-body { padding:16px; }

/* Sanskrit box */
.skt-box {
  background:linear-gradient(135deg,#fffaf0,#fff3e0);
  border:1px solid #e8c870; border-left:4px solid var(--gold);
  border-radius:8px; padding:14px 16px; margin-bottom:14px;
}
.skt-box::before {
  content:'🕉  Transliteration (IAST)';
  display:block; font-size:.7rem; font-weight:700;
  text-transform:uppercase; letter-spacing:1px;
  color:var(--gold); margin-bottom:8px;
}
.skt-text { font-family:'Courier New',monospace; font-size:.9rem; line-height:1.75; color:#3a1a00; white-space:pre-wrap; }

/* Meaning toggle button */
.mng-btn {
  display:inline-flex; align-items:center; gap:6px;
  background:none; border:2px solid var(--saffron); border-radius:18px;
  padding:5px 14px; font-size:.8rem; font-weight:700; color:var(--saffron);
  cursor:pointer; transition:all .2s; margin-bottom:10px;
}
.mng-btn:hover { background:var(--saffron); color:#fff; }
.mng-btn.open  { background:var(--saffron); color:#fff; }
.mng-btn .arr  { transition:transform .2s; font-size:.75rem; }
.mng-btn.open .arr { transform:rotate(180deg); }

/* Meaning box */
.mng-box {
  display:none; background:var(--blue-lt);
  border:1px solid #b8d4f0; border-left:4px solid var(--blue);
  border-radius:8px; padding:14px 16px;
}
.mng-box.open { display:block; }
.mng-box::before {
  content:'📖  Meaning & Commentary';
  display:block; font-size:.7rem; font-weight:700;
  text-transform:uppercase; letter-spacing:1px;
  color:var(--blue); margin-bottom:8px;
}
.mng-text { font-size:.88rem; line-height:1.72; color:#1a3a5c; }

/* Anuvaka intro card */
.anu-intro {
  background:linear-gradient(135deg,rgba(139,26,26,.08),rgba(200,147,26,.1));
  border:1px solid var(--border); border-radius:12px;
  padding:16px 18px; margin-bottom:18px; text-align:center;
}
.anu-intro .anu-tag   { font-size:.75rem; font-weight:800; text-transform:uppercase; letter-spacing:2px; color:var(--saffron); }
.anu-intro .anu-title { font-size:1.25rem; font-weight:700; color:var(--red); margin:4px 0; }
.anu-intro .anu-sub   { font-size:.88rem; color:var(--mid); font-style:italic; }
.anu-intro .anu-summary { font-size:.83rem; color:#444; line-height:1.6; margin-top:10px;
  background:rgba(255,255,255,.6); border-radius:8px; padding:10px 14px; text-align:left; }

/* ── Park bar ────────────────────────────────────────────── */
.park-bar {
  position:fixed; bottom:0; left:0; right:0; display:none;
  background:linear-gradient(90deg,var(--deep),var(--red));
  color:#fff; padding:9px 14px; z-index:200;
  box-shadow:0 -2px 10px rgba(0,0,0,.22);
  align-items:center; gap:10px; flex-wrap:wrap;
}
.park-bar span { font-size:.8rem; flex:1; min-width:80px; }
.park-save  { background:var(--gold); color:var(--dark); border:none; border-radius:14px;
  padding:5px 13px; font-size:.77rem; font-weight:800; cursor:pointer; transition:all .2s; white-space:nowrap; }
.park-save:hover { background:var(--gold-lt); }
.park-clear { background:rgba(255,255,255,.18); color:#fff; border:1px solid rgba(255,255,255,.3);
  border-radius:14px; padding:5px 10px; font-size:.72rem; cursor:pointer; }

/* ── Scrollbar ───────────────────────────────────────────── */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--saffron); border-radius:3px; }

@media(max-width:600px) {
  .gnav-section { top:78px; }
  .gb { font-size:.72rem; padding:5px 9px; }
  .sbb { width:33px; height:33px; font-size:.75rem; }
  .header h1 { font-size:1.2rem; }
}

/* ── Home link in header ──────────────────────────────────── */
.header-home {
  position:absolute; top:50%; right:14px; transform:translateY(-50%);
  display:flex; align-items:center; gap:5px;
  background:rgba(255,255,255,.15); border:1.5px solid rgba(255,255,255,.45);
  border-radius:18px; padding:5px 12px;
  color:#fff; text-decoration:none; font-size:.75rem; font-weight:700;
  letter-spacing:.5px; transition:all .2s;
}
.header-home:hover { background:rgba(255,255,255,.28); }

/* ── Note variables ──────────────────────────────────────────── */
:root {
  --note-bg:#f0f7ff; --note-bd:#90b8e0; --note-btn:#2e6da4;
}

/* ── Has-notes indicator on verse bubble ─────────────────────── */
.sbb.has-notes::before {
  content:"✏"; font-size:8px; position:absolute; bottom:-5px; right:-5px;
  background:var(--note-btn); color:#fff; border-radius:50%;
  width:14px; height:14px; display:flex; align-items:center; justify-content:center;
}

/* ── Notes section inside card ───────────────────────────────── */
.notes-sec { border-top:1.5px dashed #c8d8f0; margin-top:4px; padding-top:11px; }
.notes-hd  { display:flex; align-items:center; gap:7px; margin-bottom:7px; }
.notes-title { font-size:12px; font-weight:700; text-transform:uppercase;
  letter-spacing:1.2px; color:var(--note-btn); }
.saved-badge { font-size:11px; background:#e8f0fb; color:var(--note-btn);
  padding:2px 8px; border-radius:10px; margin-left:auto; display:none; }
.saved-badge.show { display:inline; }
.note-ta { width:100%; min-height:76px; border:1.5px solid var(--note-bd);
  border-radius:8px; padding:9px 12px; font-size:13px; font-family:Georgia,serif;
  color:#1a2a3a; background:var(--note-bg); resize:vertical; outline:none; line-height:1.6; }
.note-ta:focus { border-color:var(--note-btn); box-shadow:0 0 0 3px rgba(46,109,164,.12); }
.note-ta::placeholder { color:#a0b8d0; font-style:italic; }
.note-actions { display:flex; gap:8px; margin-top:7px; flex-wrap:wrap; align-items:center; }
.btn-save { background:var(--note-btn); color:#fff; border:none; border-radius:8px;
  padding:7px 16px; font-size:12.5px; font-weight:700; cursor:pointer;
  font-family:Georgia,serif; transition:all .18s; }
.btn-save:hover { background:#1a5290; }
.btn-clr  { background:#fff; color:#888; border:1.5px solid #ccc;
  border-radius:8px; padding:7px 12px; font-size:12.5px; cursor:pointer;
  font-family:Georgia,serif; }
.saved-msg { font-size:12px; color:var(--note-btn); font-style:italic; display:none; }
.saved-msg.show { display:inline; }

/* ── Notes Panel ─────────────────────────────────────────────── */
.notes-panel { max-width:860px; margin:0 auto 14px; padding:0 20px; display:none; }
.notes-panel.show { display:block; }
.notes-panel-inner { background:#f0f7ff; border:1.5px solid var(--note-bd);
  border-radius:12px; padding:15px 18px; }
.np-title { font-size:13px; font-weight:700; color:var(--note-btn);
  margin-bottom:10px; display:flex; align-items:center; gap:8px; }
.np-close { margin-left:auto; background:none; border:none; color:#888;
  cursor:pointer; font-size:14px; }
.np-list  { list-style:none; display:flex; flex-direction:column; gap:8px; }
.np-item  { background:#fff; border:1px solid #c0d4ec; border-radius:8px;
  padding:9px 13px; font-size:13px; }
.np-item .ni-hd  { color:var(--saffron); font-weight:700; margin-bottom:3px; }
.np-item .ni-txt { color:#2a3a4a; font-size:12.5px; line-height:1.6; white-space:pre-line; }
.np-item .ni-del { float:right; background:none; border:none; color:#aaa;
  cursor:pointer; font-size:13px; margin-left:8px; }
.np-item .ni-del:hover { color:#c44; }
.np-empty { color:#88a0b8; font-style:italic; font-size:13px; }

/* ── Fixed FAB + Back-to-top ─────────────────────────────────── */
.notes-fab { position:fixed; bottom:60px; left:24px; z-index:99;
  background:var(--note-btn); color:#fff; border:none; border-radius:24px;
  padding:9px 16px; font-size:13px; font-weight:700; cursor:pointer;
  display:flex; align-items:center; gap:6px;
  box-shadow:0 4px 16px rgba(46,109,164,.35); transition:all .2s;
  font-family:Georgia,serif; }
.notes-fab:hover { background:#1a5290; transform:translateY(-2px); }
.fab-badge { background:#fff; color:var(--note-btn); border-radius:50%;
  width:20px; height:20px; display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:700; }
.btt { position:fixed; bottom:60px; right:24px; z-index:99; width:44px; height:44px;
  border-radius:50%; background:var(--gold); color:#fff; border:none;
  font-size:22px; cursor:pointer; display:none; align-items:center;
  justify-content:center; box-shadow:0 4px 16px rgba(150,80,0,.35); transition:all .2s; }
.btt.show  { display:flex; }
.btt:hover { background:var(--saffron); transform:translateY(-2px); }


/* ── Resume / Parked Banner ──────────────────────────────────── */
#resumeBanner { display:none; background:linear-gradient(90deg,#0f4d24,#1a7a3a);
  color:#fff; padding:12px 20px; align-items:center; gap:12px;
  flex-wrap:wrap; justify-content:center; }
#resumeBanner.show { display:flex; }
.rb-icon { font-size:22px; flex-shrink:0; }
.rb-text { font-size:14px; font-weight:600; flex:1; min-width:160px; }
.rb-text .rb-sub   { font-size:11px; opacity:.8; display:block; margin-top:2px; font-weight:400; }
.rb-text .rb-verse { font-size:12px; color:#b8f0c8; display:block; margin-top:3px; font-weight:500; }
.rb-open  { background:#fff; color:var(--park); border:none; border-radius:8px;
  padding:8px 18px; font-size:13px; font-weight:700; cursor:pointer;
  font-family:Georgia,serif; transition:all .18s; white-space:nowrap; }
.rb-open:hover { background:var(--park-lt); transform:translateY(-1px); }
.rb-clear { background:rgba(255,255,255,.15); color:#fff;
  border:1.5px solid rgba(255,255,255,.4); border-radius:8px;
  padding:8px 12px; font-size:12px; cursor:pointer; font-family:Georgia,serif; }

</style>
</head>

<div class="header">
  <span class="header-om">ॐ</span>
  <h1>Sri Rudram — Chamakam</h1>
  <h2>Taittirīya Saṃhitā • Kṛṣṇa Yajur Veda • 11 Anuvakas • Cha Me Prayer</h2>
<a class="header-home" href="index.html">&#127968; Home</a>

<!-- Main cards area -->
<div id="mc"></div>

<!-- Park bar -->
<div class="park-bar" id="parkBar">
  <span id="parkLabel">📍 No bookmark saved</span>
  <button class="park-save" onclick="savePark()">🔖 Bookmark Here</button>
  <button class="park-clear" onclick="clearPark()">✕ Clear</button>
</div>

function h(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function getParked() { try { return JSON.parse(localStorage.getItem(PARK_KEY)||'null'); } catch(e){return null;} }

// ── Build group nav (Anuvaka buttons) ────────────────────────────────────────
function buildGroupNav() {
  const gnav = document.getElementById('gnav');
  DATA.forEach(anu => {
    const btn = document.createElement('button');
    btn.className = 'gb';
    btn.id = 'gb_' + anu.num;
    btn.textContent = 'Anuvaka ' + anu.num;
    btn.onclick = () => selectAnuvaka(anu.num, null);
    gnav.appendChild(btn);
  });
}

// ── Select anuvaka: show bubble nav + first verse ─────────────────────────────
function selectAnuvaka(anuNum, forceVerse) {
  // Update group buttons
  document.querySelectorAll('.gb').forEach(b => b.classList.remove('active'));
  const gb = document.getElementById('gb_' + anuNum);
  if (gb) gb.classList.add('active');

  currentAnu = anuNum;

  // Build verse bubbles for this anuvaka
  buildVerseBubbles(anuNum);

  // Show/hide anuvaka intro card
  document.querySelectorAll('.anu-intro-card').forEach(c => c.style.display = 'none');
  const intro = document.getElementById('ai_' + anuNum);
  if (intro) intro.style.display = 'block';

  // Show requested verse (or first)
  const anu = DATA.find(d => d.num === anuNum);
  if (anu && anu.verses.length > 0) {
    const targetVerse = forceVerse !== null ? forceVerse : 1;
    showVerse(anuNum, targetVerse);
  }

  document.getElementById('mc').scrollIntoView({ behavior: 'smooth', block: 'start' });
  document.getElementById('parkBar').style.display = 'flex';
}

// ── Build verse bubble row ────────────────────────────────────────────────────
function buildVerseBubbles(anuNum) {
  const wrap = document.getElementById('snavWrap');
  const snav = document.getElementById('snav');
  const lbl  = document.getElementById('snavLabel');

  snav.innerHTML = '';
  wrap.classList.add('show');

  const anu = DATA.find(d => d.num === anuNum);
  if (!anu) return;

  lbl.textContent = 'Anuvaka ' + anuNum + ' — ' + anu.subtitle + ' — tap a verse to open';

  const parked = getParked();

  anu.verses.forEach((v, vi) => {
    const vNum = vi + 1;
    const isParked = parked && parked.anu === anuNum && parked.verse === vNum;

    const btn = document.createElement('button');
    btn.className = 'sbb' + (isParked ? ' parked' : '');
    btn.id = 'sbb_' + anuNum + '_' + vNum;
    btn.textContent = vNum;
    btn.title = 'Verse ' + vNum;
    btn.onclick = () => showVerse(anuNum, vNum);
    snav.appendChild(btn);
  });
}

// ── Show a single verse card ──────────────────────────────────────────────────
function showVerse(anuNum, vNum) {
  // Hide all cards
  document.querySelectorAll('.card').forEach(c => c.classList.remove('vis'));

  // Show target card
  const card = document.getElementById('vc_' + anuNum + '_' + vNum);
  if (card) card.classList.add('vis');

  // Update bubble active state
  document.querySelectorAll('.sbb').forEach(b => b.classList.remove('active'));
  const sbb = document.getElementById('sbb_' + anuNum + '_' + vNum);
  if (sbb) sbb.classList.add('active');

  currentVerse = vNum;

  // Scroll to card
  const mc = document.getElementById('mc');
  if (mc) mc.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── Toggle meaning box ────────────────────────────────────────────────────────
function toggleMeaning(anuNum, vNum) {
  const btn = document.getElementById('mb_' + anuNum + '_' + vNum);
  const box = document.getElementById('mx_' + anuNum + '_' + vNum);
  if (!btn || !box) return;
  const open = box.classList.contains('open');
  box.classList.toggle('open', !open);
  btn.classList.toggle('open', !open);
  const label = btn.querySelector('.lbl');
  if (label) label.textContent = open ? 'Show Meaning' : 'Hide Meaning';
}

// ── Build all cards ───────────────────────────────────────────────────────────
function buildCards() {
  const mc = document.getElementById('mc');
  const parked = getParked();

  DATA.forEach(anu => {
    // Anuvaka intro card (always hidden, shown when anuvaka selected)
    const intro = document.createElement('div');
    intro.className = 'anu-intro-card';
    intro.id = 'ai_' + anu.num;
    intro.style.display = 'none';
    intro.innerHTML = `
      <div class="anu-intro">
        <div class="anu-tag">Anuvaka ${anu.num} of 11</div>
        <div class="anu-title">${h(anu.title)}</div>
        <div class="anu-sub">${h(anu.subtitle)}</div>
        ${anu.summary ? `<div class="anu-summary">${h(anu.summary)}</div>` : ''}
      </div>`;
    mc.appendChild(intro);

    // Verse cards
    anu.verses.forEach((verse, vi) => {
      const vNum = vi + 1;
      const cardId = 'vc_' + anu.num + '_' + vNum;
      const isParked = parked && parked.anu === anu.num && parked.verse === vNum;

      const card = document.createElement('div');
      card.className = 'card' + (isParked ? ' parked-card' : '');
      card.id = cardId;

      const sktHtml = verse.skt ? `
        <div class="skt-box">
          <div class="skt-text">${h(verse.skt)}</div>
        </div>` : '';

      const mngHtml = verse.mng ? `
        <button class="mng-btn" id="mb_${anu.num}_${vNum}" onclick="toggleMeaning(${anu.num},${vNum})">
          <span class="lbl">Show Meaning</span> <span class="arr">▼</span>
        </button>
        <div class="mng-box" id="mx_${anu.num}_${vNum}">
          <div class="mng-text">${h(verse.mng)}</div>
        </div>` : '';

      const noteKey = anu.num + '_' + vNum;
      const savedNote = getNotes()[noteKey];
      const notesSecHtml = `
        <div class="notes-sec">
          <div class="notes-hd">
            <span class="notes-title">✏ My Notes</span>
            <span class="saved-badge${savedNote ? ' show' : ''}" id="sbadge_${noteKey}">Saved ✓</span>
          </div>
          <textarea class="note-ta" id="ta_${noteKey}"
            placeholder="Add your personal notes, reflections, or commentary here…"
          >${savedNote ? h(savedNote.text) : ''}</textarea>
          <div class="note-actions">
            <button class="btn-save" onclick="handleSaveNote('${noteKey}',${anu.num},${vNum})">💾 Save Note</button>
            <button class="btn-clr"  onclick="handleClearNote('${noteKey}',${anu.num},${vNum})">✕ Clear</button>
            <span class="saved-msg" id="smsg_${noteKey}">Note saved ✓</span>
          </div>
        </div>`;

      card.innerHTML = `
        <div class="card-head">
          <div class="card-num">Anuvaka ${anu.num} • Verse ${vNum}</div>
          <div class="card-title">${h(anu.subtitle)}</div>
          <button class="park-btn${isParked ? ' parked' : ''}" id="pb_${anu.num}_${vNum}"
            onclick="parkVerse(${anu.num},${vNum})">
            ${isParked ? '🔖 Bookmarked' : '📍 Bookmark'}
          </button>
        </div>
        <div class="card-body">
          ${sktHtml}
          ${mngHtml}
          ${notesSecHtml}
        </div>`;

      mc.appendChild(card);
    });
  });
}

// ── Park / Bookmark ───────────────────────────────────────────────────────────
function parkVerse(anuNum, vNum) {
  const park = { anu: anuNum, verse: vNum, ts: new Date().toLocaleString() };
  localStorage.setItem(PARK_KEY, JSON.stringify(park));
  updateParkUI(park);

  // Update button on card
  document.querySelectorAll('.park-btn').forEach(b => {
    b.classList.remove('parked');
    b.textContent = '📍 Bookmark';
  });
  const pb = document.getElementById('pb_' + anuNum + '_' + vNum);
  if (pb) { pb.classList.add('parked'); pb.textContent = '🔖 Bookmarked'; }

  // Update bubble
  document.querySelectorAll('.sbb').forEach(b => b.classList.remove('parked'));
  const sbb = document.getElementById('sbb_' + anuNum + '_' + vNum);
  if (sbb) sbb.classList.add('parked');
}

function savePark() {
  if (currentAnu && currentVerse) parkVerse(currentAnu, currentVerse);
}

function clearPark() {
  localStorage.removeItem(PARK_KEY);
  document.getElementById('parkLabel').textContent = '📍 No bookmark saved';
  document.querySelectorAll('.park-btn').forEach(b => { b.classList.remove('parked'); b.textContent = '📍 Bookmark'; });
  document.querySelectorAll('.sbb').forEach(b => b.classList.remove('parked'));
  document.getElementById('resumeBanner').classList.remove('show');
}

function loadPark() {
  const p = getParked();
  if (p) updateParkUI(p);
}

function updateParkUI(p) {
  document.getElementById('parkLabel').textContent =
    `📍 Bookmarked: Anuvaka ${p.anu} • Verse ${p.verse}  (${p.ts})`;
  // Resume banner
  document.getElementById('rbTitle').textContent =
    'Anuvaka ' + p.anu + ' \u00b7 Verse ' + p.verse;
  var anu = DATA.find(function(a){return a.num===p.anu;});
  var versePreview = '';
  if (anu && anu.verses[p.verse-1] && anu.verses[p.verse-1].skt) {
    var skt = anu.verses[p.verse-1].skt.split('\n')[0];
    versePreview = skt.length > 80 ? skt.substring(0,80) + '...' : skt;
  }
  document.getElementById('rbVerse').textContent = versePreview;
  document.getElementById('rbOpenBtn').textContent = 'Open Verse ' + p.verse + ' \u2192';
  document.getElementById('resumeBanner').classList.add('show');
}

function openParked() {
  var p = getParked();
  if (p) selectAnuvaka(p.anu, p.verse);
}

// ── Init ──────────────────────────────────────────────────────────────────────
buildGroupNav();
buildCards();
loadPark();
selectAnuvaka(1, 1);

// ══════════════════════════════════════════
// NOTES
// ══════════════════════════════════════════
const NOTE_KEY = 'rudram_chamakam_notes';
function getNotes(){try{return JSON.parse(localStorage.getItem(NOTE_KEY)||'{}')}catch(e){return {}}}
function setNotes(n){localStorage.setItem(NOTE_KEY,JSON.stringify(n));}
function saveNote(key,text,anuNum,verseNum){
  var notes=getNotes();
  if(text.trim()){notes[key]={text:text.trim(),anuNum:anuNum,verseNum:verseNum,ts:Date.now()};}
  else{delete notes[key];}
  setNotes(notes);updateNotesBadge();
  var sbb=document.getElementById('sbb_'+anuNum+'_'+verseNum);
  if(sbb)sbb.classList.toggle('has-notes',!!notes[key]);
}
function updateNotesBadge(){
  document.getElementById('noteCount').textContent=Object.keys(getNotes()).length;
}
function toggleNotes(){
  var p=document.getElementById('notesPanel');
  if(!p.classList.contains('show'))renderNotesPanel();
  p.classList.toggle('show');
}
function renderNotesPanel(){
  var notes=getNotes();var list=document.getElementById('notesList');
  var keys=Object.keys(notes).sort(function(a,b){
    return (notes[a].anuNum||0)-(notes[b].anuNum||0)||
           (notes[a].verseNum||0)-(notes[b].verseNum||0);
  });
  if(!keys.length){
    list.innerHTML='<li class="np-empty">No notes yet. Open a verse and add notes below the meaning.</li>';
    return;
  }
  list.innerHTML=keys.map(function(k){
    var it=notes[k];
    return '<li class="np-item">'
      +'<button class="ni-del" onclick="deleteNote(\'' +k+ '\')" title="Delete">&#x2715;</button>'
      +'<div class="ni-hd">Anuvaka '+it.anuNum+' &middot; Verse '+it.verseNum+'</div>'
      +'<div class="ni-txt">'+h(it.text)+'</div>'
      +'</li>';
  }).join('');
}
function deleteNote(key){
  var notes=getNotes();var n=notes[key];delete notes[key];setNotes(notes);
  renderNotesPanel();updateNotesBadge();
  if(n){var sbb=document.getElementById('sbb_'+n.anuNum+'_'+n.verseNum);
    if(sbb)sbb.classList.remove('has-notes');}
}
function handleSaveNote(key,anuNum,verseNum){
  var ta=document.getElementById('ta_'+key);if(!ta)return;
  saveNote(key,ta.value,anuNum,verseNum);
  var msg=document.getElementById('smsg_'+key);
  if(msg){msg.classList.add('show');setTimeout(function(){msg.classList.remove('show');},1800);}
}
function handleClearNote(key,anuNum,verseNum){
  var ta=document.getElementById('ta_'+key);if(ta)ta.value='';
  saveNote(key,'',anuNum,verseNum);
}
window.addEventListener('scroll',function(){
  document.getElementById('btt').classList.toggle('show',window.scrollY>400);
});
// Init notes badge and restore has-notes indicators
updateNotesBadge();
(function(){
  var notes=getNotes();
  Object.keys(notes).forEach(function(k){
    var n=notes[k];
    if(n&&n.anuNum&&n.verseNum){
      var sbb=document.getElementById('sbb_'+n.anuNum+'_'+n.verseNum);
      if(sbb)sbb.classList.add('has-notes');
    }
  });
})();
</script>

<!-- Notes Panel -->
<div class="notes-panel" id="notesPanel">
  <div class="notes-panel-inner">
    <div class="np-title">
      ✏️ My Study Notes
      <button class="np-close" onclick="toggleNotes()">✕ Close</button>
    </div>
    <ul class="np-list" id="notesList"></ul>
  </div>
</div>

<!-- Notes FAB -->
<button class="notes-fab" id="notesFab" onclick="toggleNotes()">
  ✏️ My Notes <span class="fab-badge" id="noteCount">0</span>
</button>

<!-- Back to Top -->
<button class="btt" id="btt" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

</body>
